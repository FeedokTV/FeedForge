name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: test (${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["go.mod", "1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go != 'go.mod' && matrix.go || '' }}
          go-version-file: ${{ matrix.go == 'go.mod' && 'go.mod' || '' }}
          cache: true

      - name: Run full test suite with race detector
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Enforce coverage threshold on normalize and profile
        run: |
          go test ./internal/normalize/... ./internal/profile/... \
            -race -count=1 \
            -coverprofile=pkg_coverage.out \
            -covermode=atomic
          go tool cover -func=pkg_coverage.out | grep '^total:' | awk '{
            gsub(/%/, "", $3)
            cov = $3 + 0
            if (cov < 70) {
              printf "FAIL: normalize+profile combined coverage %.1f%% is below 70%% threshold\n", cov
              exit 1
            }
            printf "OK: normalize+profile combined coverage %.1f%% meets 70%% threshold\n", cov
          }'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.go == 'go.mod' && 'gomod' || matrix.go }}
          path: coverage.out

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build (all packages)
        run: go build ./...
      - name: Static binary build (CGO_ENABLED=0)
        run: CGO_ENABLED=0 go build -o /dev/null .

  golden-check:
    name: golden-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify golden files are up to date
        run: go test ./internal/normalize/... -run TestMap -v

  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs: [lint, test, govulncheck, build, golden-check]
    if: always()
    steps:
      - name: All jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | grep -v '"result": "success"' | grep -q '"result"' && {
            echo "One or more required jobs did not succeed."
            exit 1
          }
          echo "All required checks passed."
